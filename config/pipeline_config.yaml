# ============================================================
# Olist Big Data Pipeline — Pipeline Configuration
# ============================================================

pipeline:
  name: olist-bigdata-pipeline
  version: "1.0.0"

# --- Paths ---
paths:
  raw_data: "data/raw"
  hdfs_base: "hdfs://namenode:9000"
  bronze_path: "/warehouse/bronze"
  silver_path: "/warehouse/silver"
  gold_path: "/warehouse/gold"
  dlq_path: "/warehouse/dlq"
  watermark_file: "reports/watermark.json"
  log_file: "reports/ingestion.log"

# --- Spark ---
spark:
  app_name: "Olist-BigData-Pipeline"
  master: "spark://spark-master:7077"
  config:
    spark.driver.memory: "2g"
    spark.executor.memory: "3g"
    spark.sql.shuffle.partitions: "8"
    spark.jars.packages: "org.apache.iceberg:iceberg-spark-runtime-3.3_2.12:1.4.3"
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.iceberg_catalog: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.iceberg_catalog.type: "hadoop"
    spark.sql.catalog.iceberg_catalog.warehouse: "hdfs://namenode:9000/warehouse/iceberg"
    spark.sql.sources.partitionOverwriteMode: "dynamic"

# --- Iceberg ---
iceberg:
  catalog_name: "iceberg_catalog"
  database:
    bronze: "bronze"
    silver: "silver"
    gold: "gold"

# --- Data Quality Thresholds ---
quality:
  max_null_ratio: 0.05          # Max 5% null allowed per column
  max_duplicate_ratio: 0.01     # Max 1% duplicates allowed
  fail_on_quality_error: false  # true = pipeline stops, false = DLQ + continue
